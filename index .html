<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- tailwind + dasyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"  rel="stylesheet">

    <!-- style connection -->
    <link rel="stylesheet" href="./style/style.css">
   
</head>
<body>
    <header class="container w-3/12 mx-auto mt-[78px] shadow">
        <div class=" p-6">
            <div class="text-center">
                <img class="mx-auto" src="./assets/github-logo.png" alt="">
                <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
                <p class="text-[#64748B] text-[16px]">Sign in to manage your issues</p>
            </div>

            <!-- sign in part -->
             <fieldset class="fieldset rounded-box  p-2">

                <label class="label text-[14px]">Username</label>
                <input type="text" class="input" placeholder="Enter Username" />

                <label class="label text-[14px]">Password</label>
                <input type="password" class="input" placeholder="Password" />

                <button class="btn btn-primary mt-4">Sign In</button>

                    <!-- hr-part -->
                <div class="flex items-center gap-2 my-2">
                <hr class="flex-1 border-gray-300">
                <span class="text-gray-500">OR</span>
                <hr class="flex-1 border-gray-300">
                </div>
                <p class="text-[#64748B] text-center">Demo Credentials:</p>
                <div class="text-center py-2 bg-gray-100">
                    <p class="font-semibold">Username: admin</p>
                    <p class="font-semibold">Password: admin123</p>
                </div>
                </fieldset>
                
        </div>
        <div></div>
    </header>
</body>
</html>
