  <header>
  <nav class="flex justify-between py-2 shadow p-10">
    
    <div class="flex items-center gap-2">
      <img class="w-12" src="../assets/github-logo.png" alt="">
      <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
    </div>

    <div class="join gap-3">
      <div class="flex items-center">
        <label class="input validator join-item">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Search issues..." required />
        </label>
      </div>

      <button class="btn btn-primary rounded font-bold">
        <i class="fa-solid fa-plus"></i> New Issue
      </button>
    </div>

  </nav>
</header>

    <!-- section part-1  -->
    <section class="container mx-auto mt-10">
        <div class="flex gap-4 shadow py-3 p-5">
            <button id="allBtn" class="btn btn-outline btn-primary w-[120px] h-[40px] text-[20px]">All</button>
            <button id="openBtn" class="btn btn-outline btn-primary w-[120px] h-[40px] text-[20px]">Open</button>
            <button id="close-Btn" class="btn btn-outline btn-primary w-[120px] h-[40px] text-[20px]">Closed</button>
            <div id="btnContainer"></div>
        </div>
     
   <div class="flex items-center justify-between shadow py-4 p-4 mt-4">

  <div class="flex items-center gap-3">
    <img class="w-10 shadow rounded" src="../assets/Aperture.png" alt="">

    <div>
      <h1 class="text-2xl font-bold">50 Issues</h1>
      <p class="text-[#64748B]">Track and manage your project issues</p>
    </div>

  </div>

  <div class="flex gap-3">
    <input type="radio" class="radio radio-success" checked /><p>Open</p>
    <input type="radio" class="radio radio-secondary" checked/><p>Close</p>
  </div>

</div>
</section>
